<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Responsive Navbar with IMG Logo</title>
  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-white shadow-md fixed w-full z-10">
  <div class="max-w-7xl mx-auto px-6 py-4">

    <div class="flex items-center justify-between">

      <!-- Hosted Logo Image -->
      <div>
        <img src="https://placehold.co/100x40/4f46e5/ffffff/png?text=IMG"
             alt="IMG Logo" class="h-10 w-auto">
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center space-x-8">
        <a href="#home" class="nav-link">Home</a>
        <a href="#about" class="nav-link">About</a>
        <a href="#services" class="nav-link">Services</a>
        <a href="#contact" class="nav-link">Contact</a>
        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
          Sign Up
        </button>
      </div>

      <!-- Hamburger -->
      <button id="menu-btn" class="md:hidden relative w-8 h-8 focus:outline-none">
        <span class="block absolute h-0.5 w-8 bg-black transform transition duration-300 ease-in-out top-2"></span>
        <span class="block absolute h-0.5 w-8 bg-black transform transition duration-300 ease-in-out top-4"></span>
        <span class="block absolute h-0.5 w-8 bg-black transform transition duration-300 ease-in-out top-6"></span>
      </button>

    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu"
         class="md:hidden overflow-hidden max-h-0 transition-all duration-300 ease-in-out">
      <div class="flex flex-col mt-4 space-y-4">
        <a href="#home" class="block nav-link">Home</a>
        <a href="#about" class="block nav-link">About</a>
        <a href="#services" class="block nav-link">Services</a>
        <a href="#contact" class="block nav-link">Contact</a>
        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg w-full hover:bg-indigo-700">
          Sign Up
        </button>
      </div>
    </div>

  </div>
</nav>

<!-- Sections -->
<section id="home" class="h-screen flex items-center justify-center bg-gray-100 pt-16">
  <h1 class="text-5xl font-bold">Home Section</h1>
</section>

<section id="about" class="h-screen flex items-center justify-center bg-gray-200">
  <h1 class="text-5xl font-bold">About Section</h1>
</section>

<section id="services" class="h-screen flex items-center justify-center bg-gray-300">
  <h1 class="text-5xl font-bold">Services Section</h1>
</section>

<section id="contact" class="h-screen flex items-center justify-center bg-gray-400">
  <h1 class="text-5xl font-bold">Contact Section</h1>
</section>

<!-- Script -->
<script>
  const btn = document.getElementById('menu-btn');
  const menu = document.getElementById('mobile-menu');
  const spans = btn.querySelectorAll('span');
  const links = document.querySelectorAll('.nav-link');

  // Toggle mobile menu + animate hamburger
  btn.addEventListener('click', () => {
    if (menu.classList.contains('max-h-0')) {
      menu.classList.remove('max-h-0');
      menu.classList.add('max-h-96');
    } else {
      menu.classList.remove('max-h-96');
      menu.classList.add('max-h-0');
    }
    spans[0].classList.toggle('rotate-45');
    spans[0].classList.toggle('translate-y-2');
    spans[1].classList.toggle('opacity-0');
    spans[2].classList.toggle('-rotate-45');
    spans[2].classList.toggle('-translate-y-2');
  });

  // Active navigation link highlighting
  window.addEventListener('scroll', () => {
    let current = '';
    document.querySelectorAll('section').forEach(section => {
      const sectionTop = section.offsetTop;
      if (pageYOffset >= sectionTop - 200) {
        current = section.getAttribute('id');
      }
    });
    links.forEach(link => {
      link.classList.remove('text-indigo-600', 'font-bold');
      if (link.getAttribute('href') === '#' + current) {
        link.classList.add('text-indigo-600', 'font-bold');
      }
    });
  });
</script>

</body>
</html>
